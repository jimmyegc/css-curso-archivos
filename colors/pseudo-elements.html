<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pseudo Elements Pro</title>

  <style>
    :root {
      --transition-fast: 150ms ease;
      --transition-normal: 250ms ease;
    }

    body {
      font-family: sans-serif;
      padding: 2rem;
    }

    /* ===== TITLE ===== */
    h1 {
      position: relative;
      width: max-content;
      cursor: pointer;
    }

    h1::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 100%;
      height: 0.25em;
      border-radius: 1em;
      background: linear-gradient(to right, blue, red);

      transform: scaleX(0);
      transform-origin: left;
      transition: transform var(--transition-normal);
    }

    h1:hover::after {
      transform: scaleX(1);
    }

    /* ===== LINKS ===== */
    .container {
      display: flex;
      gap: 2rem;
      margin-top: 3rem;
    }

    a {
      position: relative;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      color: black;
      font-weight: bold;
      transition: background var(--transition-fast), color var(--transition-fast);
    }

    a:hover {
      background: var(--color);
      color: white;
    }

    /* ===== TOOLTIP ===== */
    a::before {
      content: attr(data-name);
      position: absolute;
      left: 50%;
      top: -2.5rem;
      transform: translateX(-50%) scale(0.8);

      background: var(--color);
      color: white;
      padding: 0.4em 0.8em;
      border-radius: 999px;
      font-size: 0.8rem;
      white-space: nowrap;

      opacity: 0;
      pointer-events: none;

      transition:
        transform var(--transition-normal),
        opacity var(--transition-normal);
    }

    a::after {
      content: "";
      position: absolute;
      left: 50%;
      top: -0.8rem;
      transform: translateX(-50%) scale(0.8);

      border-top: 0.5em solid var(--color);
      border-left: 0.4em solid transparent;
      border-right: 0.4em solid transparent;

      opacity: 0;
      transition:
        transform var(--transition-normal),
        opacity var(--transition-normal);
    }

    a:hover::before,
    a:hover::after {
      transform: translateX(-50%) scale(1);
      opacity: 1;
    }
  </style>
</head>

<body>

  <h1>Hello world</h1>

  <div class="container">
    <a href="#" data-name="YouTube" style="--color:#ff0000">YouTube</a>
    <a href="#" data-name="Instagram" style="--color:#e22499">Instagram</a>
    <a href="#" data-name="TikTok" style="--color:#2e192e">TikTok</a>
  </div>

</body>

</html>
